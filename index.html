<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regla de Tres Simples | Premium Calculator</title>
  <link rel="shortcut icon" href="./img/icons8-calculadora.svg" type="image/x-icon">
  <link rel="stylesheet" href="./css/main.css">
  <!-- Tailwind for layout utilities -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="flex flex-col min-h-screen">
  <header class="py-8 px-4 text-center animate-in">
    <div class="inline-flex items-center gap-2 mb-2 p-2 px-4 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-sm font-medium">
       <i data-lucide="zap" class="w-4 h-4"></i>
      Regla de Tres Simples
    </div>
    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-violet-400 to-rose-400">
        Calculadora Inteligente
      </span>
    </h1>
    <p class="text-gray-400 max-w-lg mx-auto text-sm md:text-base">
      Calcula proporciones de manera instantánea con una interfaz profesional.
    </p>
  </header>

  <main class="flex-grow container mx-auto max-w-2xl px-4 py-4 md:py-8 animate-in" style="animation-delay: 0.1s;">


    <!-- Main Card -->
    <div class="glass-card p-6 md:p-10 relative overflow-hidden">
      <div class="absolute top-0 right-0 p-4 opacity-10">
        <i data-lucide="calculator" class="w-24 h-24"></i>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
        <div class="space-y-6">
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-indigo-400 uppercase tracking-wider">Si un valor A</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs">V1</span>
              <input type="number" id="v1" class="input-glass w-full pl-8 pr-4 py-3 rounded-xl text-lg" placeholder="10">
            </div>
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-semibold text-violet-400 uppercase tracking-wider">Produce un valor B</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs">V2</span>
              <input type="number" id="v2" class="input-glass w-full pl-8 pr-4 py-3 rounded-xl text-lg" placeholder="20">
            </div>
          </div>

          <div class="space-y-2 pt-4">
            <label class="block text-xs font-semibold text-rose-400 uppercase tracking-wider">Entonces un valor C</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs">V3</span>
              <input type="number" id="v3" class="input-glass w-full pl-8 pr-4 py-3 rounded-xl text-lg" placeholder="5">
            </div>
          </div>
        </div>

        <!-- Result Section -->
        <div class="flex flex-col items-center justify-center bg-white/5 rounded-2xl p-8 border border-white/5 space-y-4">
          <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Resultado Final</div>
          <div id="result-display" class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-gray-400">
            0
          </div>

        </div>
      </div>

      <div class="mt-10 flex flex-col md:flex-row gap-4 items-center">
        <button id="showmore" class="flex items-center gap-2 text-indigo-400 hover:text-indigo-300 transition-colors text-sm font-medium">
          <i data-lucide="help-circle" class="w-4 h-4"></i>
          ¿Cómo funciona?
        </button>
        <button id="clear-btn" class="ml-auto text-gray-500 hover:text-white transition-colors text-sm">
          Limpiar campos
        </button>
      </div>
    </div>
  </main>

  <footer class="py-6 px-4 mt-12">
    <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-rose-500 flex items-center justify-center font-bold text-lg">E</div>
        <p class="text-sm font-medium text-gray-400">© 2023 EmilianoCampos</p>
      </div>
      
      <div class="flex items-center gap-6">
        <a href="https://www.linkedin.com/in/emiliano-campos-campazzo-b06b8126b/" target="_blank" class="text-gray-500 hover:text-indigo-400 transition-colors">
          <i data-lucide="linkedin" class="w-5 h-5"></i>
        </a>
        <a href="https://github.com/emilianocampos" target="_blank" class="text-gray-500 hover:text-white transition-colors">
          <i data-lucide="github" class="w-5 h-5"></i>
        </a>
      </div>
    </div>
  </footer>

  <script src="./js/main.js"></script>
  <script>
    // Initialize icons
    lucide.createIcons();
  </script>
</body>

</html>
